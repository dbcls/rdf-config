# --- A: アミノ酸配列レベル (ahaplotypesummary) -------------------------------
- AHap jogo_hap:ALDH2:a1:
  - a: jogo:AHaplotype
  - dcterms:identifier:
    - ahapid: "ALDH2:a1"           # ← gene symbol + ゼロパディング除去
  - skos:altLabel:
    - ahapid_padded: "ALDH2:a0001"
  - foaf:page:
    - a_page: <https://jogo.csml.org/haplotype_detail?hapid=a0001&regionname=ALDH2_chr12_111761933_111822532>
  - jogo:sequenceLength:           # alen = アミノ酸残基数
    - alen: 517
  - jogo:totalCount:               # total = 観測ハプロタイプ本数
    - a_total: 311
  - jogo:isGRCh38Reference:
    - a_grch38p0: 1
  - jogo:isCHM13Reference:
    - a_chm13v2: 1
  - jogo:isMANEReference:
    - a_maneref: 1
  - jogo:hasVariant*:              # avariants 由来
    - a_variant: Variant
  - jogo:frequency*:               # *_total を集団ごとに pivot
    - []:
      - a: jogo:PopulationFrequency
      - jogo:population:
        - a_freq_pop: Pop
      - jogo:alleleCount:
        - a_freq_count: 87
  - jogo:hasSampleHaplotype*:      # region/samples 由来 (この a を持つ sample-haplotype)
    - a_sample_hap: SampleHap

