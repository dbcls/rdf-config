# ontology の jogo:UHaplotype / jogo:DHaplotype は次版のため残置。


# =============================================================================
# サンプルハプロタイプ (region 毎の phasing, hp1/hp2)
#   出典: regions/<rn>/samples (a〜actg)。REF(参照ゲノム)は除外。
#   URI は gene region 毎の phasing なので gene_key スコープ (ALDH2:HG02074.hp1)。
# =============================================================================
- SampleHap jogo_sample:ALDH2:HG02074.hp1:
  - a: jogo:SampleHaplotype
  - dcterms:identifier:
    - sample_hap_id: "ALDH2:HG02074.hp1"
  - jogo:sample:
    - sample: Sample

# Sample 本体は samples.ttl / templates/population.ttl 側で定義 (ここは参照シェイプ)
- Sample jogo_sample:HG02074:
  - a: jogo:Sample
  - dcterms:identifier:
    - sample_id: "HG02074"


# =============================================================================
# バリアント (avariants / cvariants / tvariants / gvariants) — 2ノード構成
#   Variant        : 遺伝子別レコード。頻度/snpEff注釈/hgvs を持ち、gene_key でスコープ
#                    (jogo_var:<gene_key>:<chr-pos-ref-alt>)。haplotype の hasVariant 先。
#   GenomicVariant : gene非依存の正準ゲノム変異 (jogo_var:<chr-pos-ref-alt>)。class/ref/alt/
#                    location を持ち座標ベースで全遺伝子共有。記述は TogoVar RDF (GVO/FALDO) 準拠。
#   双方向リンク: Variant jogo:genomicVariant→ GenomicVariant / GenomicVariant jogo:hasGeneVariant→ Variant
# =============================================================================

# --- 遺伝子別レコード -------------------------------------------------------
- Variant jogo_var:ALDH2:12-111790546-C-A:
  - a: jogo:Variant
  - jogo:alleleCount:
    - ac: 1
  - jogo:alleleNumber:
    - an: 342
  - jogo:alleleFrequency:
    - af: 0.00292
  - jogo:annotation:
    - snpeff_annotation: "missense_variant"
  - jogo:annotationImpact:
    - snpeff_annotation_impact: "MODERATE"
  - jogo:hgvsC:
    - snpeff_hgvs_c: "c.665C>A"
  - jogo:hgvsP:
    - snpeff_hgvs_p: "p.Ala222Asp"
  - jogo:genomicVariant:
    - genomic_variant: GenomicVariant

# --- 共通(gene非依存)ゲノム変異 ---------------------------------------------
- GenomicVariant jogo_var:12-111790546-C-A:
  - a: gvo:SNV                     # gvo:Variation のサブクラス。ref/alt長で SNV/MNV/Ins/Del/Indel を判定
  - dcterms:identifier:
    - var_id: "12-111790546-C-A"
  - gvo:ref:
    - ref: "C"
  - gvo:alt:
    - alt: "A"
  - faldo:location:
    - []:
      - a: faldo:ExactPosition
      - faldo:position:
        - pos: 111790546
      - faldo:reference:
        - var_ref: hco:12\/GRCh38
  # TogoVar 登録を見据え、TogoVar の変異 URI へ rdfs:seeAlso で接続
  - rdfs:seeAlso:
    - togovar_variant: <http://identifiers.org/hco/12/GRCh38#111790546-C-A>
  - jogo:hasGeneVariant:
    - has_gene_variant: Variant


