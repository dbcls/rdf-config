# =============================================================================
# JoGo Haplotype Database — rdf-config model.yaml
# =============================================================================
# クラス名は略記コードに統一し、意味は schema.yaml の label/description で与える:
#   AHaplotype     アミノ酸配列レベル (individual)  ← ahaplotypesummary  (ahapid  a0001)
#   CHaplotype     コーディング(CDS)レベル          ← chaplotypesummary  (chapid  c0001)
#   THaplotype     転写産物レベル                   ← thaplotypesummary  (thapid  t0001)
#   GHaplotype     遺伝子本体レベル                 ← ghaplotypesummary  (ghapid  g0001)
#   ACHaplotype    A+C 複合                         ← achaplotypesummary   (achapid   a0001c0001)
#   ACTHaplotype   A+C+T 複合                       ← acthaplotypesummary  (acthapid  a0001c0001t0001)
#   ACTGHaplotype  A+C+T+G 複合(サンプル単位の完全) ← actghaplotypesummary (actghapid a0001c0001t0001g0004)
#   UHaplotype     上流レベル                       ← regions/<rn>/flanks upstream   (uid u0001)
#   DHaplotype     下流レベル                       ← regions/<rn>/flanks downstream (did d0001)
#   個別 A/C/T/G は各レベル独立採番。複合は ahapid/chapid/thapid/ghapid で個別を参照。
#   U/D は flanks を uid/did で集計 (total + 集団別 frequency を a/c/t/g と同形で保持)。
#
# ID 規則:
#   - ハプロタイプ階層部分はコロン無しが正式 (例 a1c1t1g4 ／ データの a0001c0001…)
#   - dcterms:identifier はゼロパディングを除去した形 (a0001→a1, c0010→c10)
#   - skos:altLabel にゼロパディング付きの元表記 (a0001 等)
#   - ゼロのみ (a0000) は除去すると空になるため a0 とする
#   - URI ローカル部にも除去済み正準 ID を使用 (jogo_hap:ALDH2:a1)
#
# サンプルハプロタイプ (phasing):
#   - a〜actg は regions/<rn>/samples、u/d は flanks から、各ハプロタイプが
#     jogo:hasSampleHaplotype で保持。SampleHaplotype は gene_key スコープ
#     (jogo_sample:ALDH2:HG02074.hp1)、jogo:sample で Sample へ。
#   - REF(参照ゲノム homoSapiens_grch38/chm13v2) は sample 扱いから除外。
#
# 保留:
#   - flank variants (upstream_gene_variant/downstream_gene_variant) は入力データ再検討中のため未格納。
#
# 必要な prefix (prefix.yaml 側で定義 / 出典 prefix_page.tsv):
#   jogo:        <http://jogo.csml.org/ontology#>
#   jogo_gene:   <http://jogo.csml.org/rdf/gene/>
#   jogo_hap:    <http://jogo.csml.org/rdf/haplotype/>
#   jogo_var:    <http://jogo.csml.org/rdf/variant/>
#   jogo_pop:    <http://jogo.csml.org/rdf/population/>
#   hco:         <http://identifiers.org/hco/>
#   hgnc:        <http://identifiers.org/hgnc/>
#   ensembl:     <http://identifiers.org/ensembl/>
#   faldo:       <http://biohackathon.org/resource/faldo#>
#   gvo:         <http://genome-variation.org/resource/gvo#>
#   foaf:        <http://xmlns.com/foaf/0.1/>
#   dcterms:     <http://purl.org/dc/terms/>
#   skos:        <http://www.w3.org/2004/02/skos/core#>
#   rdfs:        <http://www.w3.org/2000/01/rdf-schema#>
#
# foaf:page (Web 詳細ページ, prefix_page.tsv より):
#   gene: https://jogo.csml.org/gene?genename={regionname5000}
#   hap : https://jogo.csml.org/haplotype_detail?hapid={padded hapid}&regionname={regionname5000}
# =============================================================================


# -----------------------------------------------------------------------------
# 遺伝子領域 (maneinfo)
# -----------------------------------------------------------------------------
- GeneRegion jogo_gene:ALDH2:
  - a: jogo:GeneRegion
  - rdfs:label:
    - symbol: "ALDH2"
  - dcterms:description:
    - name: "aldehyde dehydrogenase 2 family member"
  - jogo:regionName:
    - regionname5000: "ALDH2_chr12_111761933_111822532"
  - jogo:maneStatus:
    - mane_status: "MANE Select"
  - jogo:maneVersion:
    - ver: "v1.2"
  - foaf:page:
    - gene_page: <https://jogo.csml.org/gene?genename=ALDH2_chr12_111761933_111822532>
  # --- 個別レベルのハプロタイプ一覧 ---
  - jogo:aHaplotype+:
    - a_hap: AHap
  - jogo:cHaplotype+:
    - c_hap: CHap
  - jogo:tHaplotype+:
    - t_hap: THap
  - jogo:gHaplotype+:
    - g_hap: GHap
  # --- 複合レベルのハプロタイプ一覧 ---
  - jogo:acHaplotype+:
    - ac_hap: ACHap
  - jogo:actHaplotype+:
    - act_hap: ACTHap
  - jogo:actgHaplotype+:
    - actg_hap: ACTGHap
  # 上流/下流レベル(U/D)は今版では出力しない (次版で対応。ontology には class は残置)
  # --- 外部 DB ---
  - rdfs:seeAlso:
    - hgnc: hgnc:404
  - rdfs:seeAlso:
    - ensembl_gene: ensembl:ENSG00000111275
  # --- ゲノム座標 (faldo) ---
  - faldo:location:
    - []:
      - a: faldo:Region
      - faldo:begin:
        - []:
          - a: faldo:ExactPosition
          - faldo:position:
            - start: 111766933
          - faldo:reference:
            - start_ref: hco:12\/GRCh38
      - faldo:end:
        - []:
          - a: faldo:ExactPosition
          - faldo:position:
            - end: 111817532
          - faldo:reference:
            - end_ref: hco:12\/GRCh38


