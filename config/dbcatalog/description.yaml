dataset:
  name: Integbio Database Catalog/RDF
  description: Integbio Database Catalog/RDF is a translation of Integbio Database Catalog data into RDF
variables:
  DatabaseInfo: A dataset record in the Integbio Database Catalog.
  xref_jglobal: A cross-reference URL to the J-GLOBAL organization page.
  jglobal_id: The J-GLOBAL page URI for the publisher.
  xref_similardb: A reference to a related database in the catalog.
  xref_togotv: A link to a TogoTV page related to the database.
  xref_dbarchive: A link to the DBCLS Database Archive page.
  downloadmetadata_url: A URL describing downloadable resources or metadata.
  dbrights_url: A URL describing rights information for the distribution.
  downloadpage_url: An access URL for the distribution or download page.
  theme_tag: A thematic category assigned to the database.
  DatabaseTag: A thematic tag concept used to categorize databases.
