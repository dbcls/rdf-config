dataset:
  name: Integbio Database Catalog/RDF
  description: Integbio Database Catalog/RDF is a translation of Integbio Database Catalog data into RDF
variables:
  DatabaseInfo: A dataset record in the Integbio Database Catalog.
  database_name: The primary title of the database.
  alternative_name: An alternative or expanded name of the database.
  database_description: A textual summary of the database.
  database_id: The identifier assigned to the database in the catalog.
  language: A language associated with the database metadata.
  organization_name: The name of the publishing organization.
  country_region: The country or region of the publisher.
  xref_jglobal: A cross-reference URL to the J-GLOBAL organization page.
  jglobal_id: The J-GLOBAL page URI for the publisher.
  pubmed_id: A PubMed reference related to the database.
  xref_similardb: A reference to a related database in the catalog.
  xref_togotv: A link to a TogoTV page related to the database.
  xref_dbarchive: A link to the DBCLS Database Archive page.
  downloadmetadata_url: A URL describing downloadable resources or metadata.
  dbrights_url: A URL describing rights information for the distribution.
  downloadpage_url: An access URL for the distribution or download page.
  landingpage_url: The main landing page URL of the database.
  theme_tag: A thematic category assigned to the database.
  taxonomy_id: A taxonomy identifier associated with the database.
  status: The current publication or activity status of the database.
  DatabaseTag: A thematic tag concept used to categorize databases.
  tag_id: The identifier of the database tag.
  tag_definition: The definition of the database tag.
  tag: The label of the database tag.
  tag_label: The preferred label of the database tag.
