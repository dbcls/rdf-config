    - split("|")
    - delete(/\A\s+|\s+\z/)
    - prepend("http://identifiers.org/insdc/")
  - objects:
    - insdc_id: 
      - col("ena")
      - split("|")
      - delete(/\A\s+|\s+\z/)

- RefSeq:
