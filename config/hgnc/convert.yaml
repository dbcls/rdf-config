- RGD:
  - subject:
    - col("rgd_id")
    - split("|")
    - delete(/\A\s+|\s+\z/)
    - delete(/^RGD:/)
    - prepend("http://identifiers.org/rgd/")
  - objects:
    - rgd_id:
      - col("rgd_id")
      - split("|")
      - delete(/\A\s+|\s+\z/)
      - delete(/^RGD:/)

- LRG:
  - subject:
    - col("lsdb")
    - split("|")
    - replace(/\A(?!LRG_\d+\z).*\z/, "")
    - prepend("http://identifiers.org/lrg/")
  - objects:
    - lrg_id: 
      - col("lsdb")
      - split("|")
      - replace(/\A(?!LRG_\d+\z).*\z/, "")

