# Input file
#   https://storage.googleapis.com/public-download-files/hgnc/tsv/tsv/hgnc_complete_set.txt

- HGNC:
  - subject:
    - col("hgnc_id")
    - downcase
  - objects:
    - gene_id: col("symbol")
    - hgnc_id:
      - col("hgnc_id")
      - delete(/^HGNC:/)
    - description: col("name")
    - location: col("location")
    - alt_label:
      - $alias_symbol: col("alias_symbol")
      - $alias_name: col("alias_name")
      - join($alias_symbol, $alias_name, "|")
      - split("|")
    - history_note: col("status")

- NCBIGene:
  - subject:
    - col("entrez_id")
    - prepend("http://identifiers.org/ncbigene/")
  - objects:
    - ncbigene_id: col("entrez_id")

- Ensembl:
  - subject:
    - col("ensembl_gene_id")
    - prepend("http://identifiers.org/ensembl/")
  - objects:
    - ensembl_id: col("ensembl_gene_id")

- ENA:
  - subject:
    - col("ena")
    - split("|")
    - delete(/\A\s+|\s+\z/)
    - prepend("http://identifiers.org/ena.embl/")
  - objects:
    - ena_id: 
      - col("ena")
      - split("|")
      - delete(/\A\s+|\s+\z/)

- INSDC:
