# How to create DuckDB database for CCLE (ccle.duckdb)
#
# (1) Please download the following 3 files from the CCLE data page
#     (https://depmap.org/portal/data_page/?tab=allData) and save it in `convert` directory.
# * CCLE_DepMap_18q3_RNAseq_RPKM_20180718.gct
# * CCLE_DepMap_18q3_maf_20180718.txt
# * Cell_lines_annotations_20181226.txt
#
# To download the `CCLE_DepMap_18q3_RNAseq_RPKM_20180718.gct` and `CCLE_DepMap_18q3_maf_20180718.txt` files,
# select [DepMap Public] from the drop-down list under "Select a file set to view:",
# and then select [DepMap Public 18Q3 Files] next to "Version:".
#
# To download the `Cell_lines_annotations_20181226.txt` file,
# select [CCLE2019] from the drop-down list under "Select a file set to view:",
#
# (2) To create the CCLE DuckDB database (ccle.duckdb), run ./convert/build_ccle_duckdb.sh.
# % ./convert/build_ccle_duckdb.sh

- CCLE:
    - source("convert/ccle.duckdb", :duckdb, "cell_lines_annotations")
    - subject:
        - col("CCLE_ID")
        - prepend("cclec:")
    - objects:
        - ccle_label:
            - col("Name")
            - skip("NA")
        - hist_primary:
            - col("Histology")
            - skip("NA")
        - hist_secondary:
            - col("Hist_Subtype1")
            - skip("NA", "NS")
        - site_primary:
            - col("Site_Primary")
            - skip("NA")
        - gender:
            - switch("Gender"):
                  "male": obo:PATO_0000384
                  "female": obo:PATO_0000383
        # - ccle_see_also:
        #     - col("bto_ids")
        #     - split("|")
        #     - prepend("obo:")

- EnsemblGene:
    - source("convert/ccle.duckdb", :duckdb, "ensembl_genes")
    - subject:
        - col("ensembl_gene_id")
        - delete(/\.\d+$/)
        - prepend("ccleg:")
    - objects:
        - ensg_label: col("gene_name")
        - ensg_see_also:
            - col("ensembl_gene_id")
            - delete(/\.\d+$/)
            - prepend("http://rdf.ebi.ac.uk/resource/ensembl/")

- EntrezGene:
    - source("convert/ccle.duckdb", :duckdb, "depmap_mafs")
    - subject:
        - col("Hugo_Symbol")
        - prepend("ccleg:")
    - objects:
        - entrez_gene_label: col("Hugo_Symbol")
        - entrez_gene_id:
            - col("Entrez_Gene_Id")
            - skip("0")

- CCLE:
    - source("convert/ccle.duckdb", :duckdb, "ccle_gene_expressions")
    - $subject:
        - col("ccle_CCLE_ID")
        - prepend("cclec:")
    - subject: $subject
    - objects:
        - assay_gene:
            - col("gene_exp_ensembl_gene_id")
            - delete(/\.\d+\z/)
            - prepend("ccleg:")
        - assay_sample: $subject
        - exp_val: col("gene_exp_gene_expression")

- CCLE:
    - source("convert/ccle.duckdb", :duckdb, "ccle_depmap_mafs")
    - $chr: col("maf_Chromosome")
    - $ncbi_build: col("maf_NCBI_Build")
    - $gene: col("maf_Hugo_Symbol")
    - $variation_label:
          - col("maf_Protein_Change")
          - delete(/^p\./)
    - subject:
          - col("ccle_CCLE_ID")
          - prepend("cclec:")
    - objects:
          - ccle_variation_label: $variation_label
          - ccle_snp_start_pos: col("maf_Start_position")
          - ccle_snp_start_reference: "hco:$chr#GRCh$ncbi_build"
          - ccle_snp_end_pos: col("maf_End_position")
          - ccle_snp_end_reference: "hco:$chr#GRCh$ncbi_build"
          - ccle_alternative_allele: col("maf_Tumor_Seq_Allele1")
          - ccle_variant_gene: "ccleg:$gene"
          - ccle_reference_allele: col("maf_Reference_Allele")
          - ccle_variant_transcript_label: col("maf_Annotation_Transcript")
          - ccle_variant_transcript_gene:
                - col("maf_Hugo_Symbol")
                - prepend("ccleg:")
          - ccle_variant_transcript_see_also:
                - col("maf_Annotation_Transcript")
                - delete(/\.\d+$/)
                - prepend("transcript:")
          - ccle_variant_consequence:
                - switch("maf_Variant_Classification"):
                      "Missense_Mutation": sio:SO_0001583
                      "Silent": sio:SO_0001819
                      "Splice_Site": sio:SO_0001630
                      "De_novo_Start_OutOfFrame": sio:SO_0001589
                      "Nonsense_Mutation": sio:SO_0001587
                      "Nonstop_Mutation": sio:SO_0001578
                      "Start_Codon_SNP": sio:SO_0002012
          - ccle_variant_type: col("maf_Variant_Type")
          - ccle_codon_change: col("maf_Codon_Change")
          - ccle_dna_change: col("maf_cDNA_Change")
          - ccle_protein_change: col("maf_Protein_Change")
