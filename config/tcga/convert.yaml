      - col("file_name")
    - file_size:
      - col("file_size")
      # - to_int
    - data_type:
      - col("data_type")
    - data_category:
      - col("data_category")
    - data_format:
      - col("data_format")
    - experimental_strategy:
      - col("experimental_strategy")
    - platform:
      - col("platform")
    - access:
      - col("access")
    - case_id:
      - col("case_id")
      - prepend("tcgac:")
    - file_project_id:
      - col("project_id")
      - prepend("tcgap:")

