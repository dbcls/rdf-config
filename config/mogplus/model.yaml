# RDF-config model.yaml for MoG+ RDF generated by:
#   - convert_vcf_vep_to_rdf.rb v21
#   - mogplus_vcf_gtf_gene_overlap.rb
#
# Scope:
#   Variant / genotype / bioresource / VEP CSQ / SnpEff ANN / VCF header definitions
#   and Ensembl gene-overlap links.
#
# Notes:
#   - Existing GVO terms such as gvo:SNV, gvo:Variation, gvo:pos, gvo:ref,
#     and gvo:alt are reused and not redefined here.
#   - GenotypeCall is the compact v21 model: redundant FORMAT nodes and
#     reference/no-call genotypes may be omitted by converter options.
#   - VEP and SnpEff annotations are separate because their source tools and
#     field semantics are different.

- Variant <http://identifiers.org/mogplus/v3/1/GRCm39#3050118-G-A>:
  - a: gvo:SNV
  - faldo:location:
    - []:
      - a: faldo:ExactPosition
      - faldo:position:
        - faldo_position: 3050118
      - faldo:reference:
        - reference_sequence: <http://identifiers.org/mco/1/GRCm39>
  - gvo:pos:
    - position: 3050118
  - gvo:ref:
    - reference_allele: G
  - gvo:alt:
    - alternate_allele: A
  - gvo:filter?:
    - filter_status: PASS

  # Per-strain genotype calls. In v21, no-call genotypes are omitted, and
  # reference genotypes may be omitted with --skip-reference-genotype.
  - vcf:has_genotype_call*:
    - genotype_call: GenotypeCall

  # Structured Ensembl VEP CSQ annotations, used by MoG+ v3 / REL2021-style files.
  - vep:has_consequence*:
    - vep_consequence_annotation: VepConsequenceAnnotation

  # Structured SnpEff ANN annotations, used by MoG+ v2.1-style files.
  - snpeff:has_annotation*:
    - snpeff_annotation: SnpEffAnnotation

  # Coordinate-based overlap with Ensembl genes, generated by
  # mogplus_vcf_gtf_gene_overlap.rb.
  - mogplus:overlaps_gene*:
    - overlapping_ensembl_gene: ensg:ENSMUSG00000051951

  # Optional fields emitted only when corresponding converter options are used.
  - vcf:variation_class?:
    - variation_class: SNP
  - vcf:source_file_index*:
    - source_file_index: "6"

  # Generic fallback for unknown INFO fields when --no-info is not used.
  - vcf:has_info_field*:
    - info_field: InfoField

- GenotypeCall <http://identifiers.org/mogplus/v3/1/GRCm39#3050118-G-A/genotype/FLS_Shi>:
  - a: vcf:GenotypeCall
  - med2rdf:sample:
    - bioresource: BiologicalResource
  - vcf:genotype:
    - genotype: 1/1
  - vcf:ad_ref?:
    - reference_read_depth: 0
  - vcf:ad_alt?:
    - alternate_read_depth: 44
  - vcf:sample_read_depth?:
    - sample_read_depth: 44
  - vcf:genotype_likelihoods?:
    - genotype_likelihoods: "1814,132,0"

  # FORMAT fields that may appear in some input files and are represented
  # directly on the GenotypeCall node when present.
  - vcf:minimum_read_depth?:
    - minimum_read_depth: 17
  - vcf:reference_genotype_quality?:
    - reference_genotype_quality: 99
  - vcf:phased_genotype?:
    - phased_genotype: 1|1
  - vcf:phase_id?:
    - phase_id: 3054830_AACACACACACAC_A
  - vcf:strand_bias_counts?:
    - strand_bias_counts: "0,0,23,21"

- BiologicalResource mogbs:FLS_Shi:
  - a: brso:BiologicalResource
  - rdfs:label:
    - strain_label: FLS/Shi
  - dct:identifier?:
    - strain_identifier: FLSv1
  - rdfs:seeAlso?:
    - mgi_resource: mgi:6200890

